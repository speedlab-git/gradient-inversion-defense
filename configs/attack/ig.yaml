defaults:
  - _default_optimization_attack
  - _self_

# Inverting Gradients (Geiping, Bauermeister, Dröge, Moeller — NeurIPS 2020)
# Cosine-similarity gradient matching, total-variation prior,
# signed Adam with cosine-annealed step size.
# Label recovery: Yin et al. (works for batches).
type: IG
label_strategy: yin

objective:
  type: cosine-similarity
  scale: 1.0
  task_regularization: 0.0

restarts:
  num_trials: 1
  scoring: cosine-similarity

init: patterned-4-randn
normalize_gradients: False

optim:
  optimizer: adam
  signed: "soft"
  step_size: 0.1
  step_size_decay: cosine-decay
  boxed: True
  max_iterations: 24_000
  langevin_noise: 0.0
  warmup: 50
  pixel_decay: 0.0
  grad_clip:
  callback: 1000

regularization:
  total_variation:
    scale: 1.0e-1
    inner_exp: 1
    outer_exp: 1
    tv_start: 0
  group_regular:
    scale: 0.0
    totalseeds: 1
    startIter: 10_000_000
    updateRegPeriod: 200
    mode: "lazy"
    weighted: False

augmentations:

save_dir: "outputs/"
