defaults:
  - _default_optimization_attack
  - _self_

# GradInversion / "See Through Gradients" (Yin, Mallya, Vahdat, Alvarez,
# Kautz, Molchanov — CVPR 2021)
# Euclidean gradient matching + fidelity regularizer (TV + L2 pixel norm)
# + BN-statistic (DeepInversion) prior. Single-seed variant: group
# consistency disabled so we stay on the _run_trial code path.
# Label recovery: Yin et al. per-column min-logit strategy.
type: GradInversion
label_strategy: yin

objective:
  type: euclidean
  scale: 1.0e-4
  task_regularization: 0.0

restarts:
  num_trials: 1
  scoring: euclidean

init: randn
normalize_gradients: False

optim:
  optimizer: adam
  signed:
  step_size: 0.1
  step_size_decay: cosine-decay
  boxed: True
  max_iterations: 24_000
  langevin_noise: 0.0
  warmup: 50
  pixel_decay: 0.0
  grad_clip:
  callback: 1000

regularization:
  total_variation:
    scale: 1.0e-4
    inner_exp: 2
    outer_exp: 0.5
    tv_start: 0
  norm:
    scale: 1.0e-4
    pnorm: 2
    norm_start: 0
  deep_inversion:
    scale: 1.0e-3
    first_bn_multiplier: 10
    second_bn_multiplier: 10
    deep_inv_start: 0
    deep_inv_stop: 24_000
    aux_batchnorm: False
    aux_model:
  group_regular:
    scale: 0.0
    totalseeds: 1
    startIter: 10_000_000
    updateRegPeriod: 200
    mode: "lazy"
    weighted: False

augmentations:

save_dir: "outputs/"
